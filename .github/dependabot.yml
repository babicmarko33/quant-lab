version: 2
updates:
  # Python dependencies (pip)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    ignore:
      # Ignore major version bumps for heavy dependencies
      - dependency-name: torch
        update-types: ["version-update:semver-major"]
      - dependency-name: xgboost
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    labels:
      - dependencies
      - github-actions
